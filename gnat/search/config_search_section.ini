# =============================================================================
# Search Sidecar (Solr) — optional full-text search layer
# =============================================================================
#
# The search sidecar is opt-in.  If this section is absent (or backend is
# set to "memory"), all search operations use the in-memory fallback and
# nothing connects to Solr.
#
# backend options:
#   memory  — in-memory string scan (default, no external dependency)
#   solr    — Solr HTTP sidecar (requires a running Solr instance)
#
# Setup checklist for backend = solr:
#   1. Install and start Solr 9.x
#   2. Create the collection:
#        bin/solr create -c ctmsak
#   3. Apply the managed schema (see solr_schema_ctmsak.xml in this repo)
#   4. Set solr_url below
#   5. Optionally set batch_size and timeout to match your ingest volume

[search]
backend     = memory
; backend   = solr

solr_url    = http://localhost:8983/solr/ctmsak

; HTTP timeout for Solr requests (seconds).
; Keep this low — Solr is a sidecar.  A hung Solr should not delay
; ingest runs or search fallbacks.
timeout     = 10

; Retries on transient 429/5xx from Solr.
max_retries = 2

; TLS verification for Solr.  Set false only for local dev.
verify_ssl  = true

; Maximum documents per batch POST to /update.
; 100 is conservative — safe for documents with large text_content.
; Increase to 500 if your ingest throughput warrants it.
batch_size  = 100
