# docker/test/gnat.test.ini
# ---------------------------------------------------------------------------
# Minimal GNAT configuration for Docker integration tests.
# Connects to the test containers defined in docker-compose.test.yml.
# ---------------------------------------------------------------------------

[gnat]
debug = false
workspace_dir = /tmp/gnat-test-workspace

[elastic]
host = http://localhost:19200
auth_type = none

[search]
solr_url = http://localhost:18983/solr/gnat
enabled = true
batch_size = 50
