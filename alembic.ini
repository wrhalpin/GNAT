# Alembic configuration for GNAT
# See https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone = UTC

# Database URL — override via GNAT_DB_URL environment variable.
# This value is also read in alembic/env.py.  When running via
# `gnat db upgrade`, the URL is resolved from the GNAT config file.
sqlalchemy.url = sqlite:///%(here)s/gnat.db

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
