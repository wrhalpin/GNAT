version: 1
providers:
  azurekeyvault:
    vault_url: https://gnat-prod-kv.vault.azure.net/
  cyberark:
    tenant_url: https://example.privilegecloud.cyberark.com/
    safe: GNAT
policy:
  naming:
    convention: /{environment}/{connector}/{credential_type}
  allowed_environments:
    - dev
    - test
    - prod
  rules:
    - action: get
      pattern: prod/*
      allowed_requestors: [runtime, rotation, system]
      allowed_purposes: [runtime, rotation]
    - action: put
      pattern: prod/*
      allowed_requestors: [rotation, system]
      allowed_purposes: [rotation]
    - action: get
      pattern: dev/*
      allowed_requestors: [developer, ci, runtime, system]
      allowed_purposes: [development, ci, runtime]
