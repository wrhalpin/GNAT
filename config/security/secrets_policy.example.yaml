rules:
  - path_prefix: "prod/"
    actions: ["resolve", "describe"]
    allowed_callers: ["runtime", "connector_executor"]
    return_mode: "in_memory_only"

  - path_prefix: "dev/"
    actions: ["resolve", "store", "describe"]
    allowed_callers: ["runtime", "ci", "developer_tools"]
    overwrite: false
    return_mode: "in_memory_only"

  - path_prefix: "prod/"
    actions: ["store"]
    allowed_callers: ["release_workflow"]
    overwrite: false
    require_approval: true
    return_mode: "metadata_only"

  - path_prefix: "prod/"
    actions: ["checkout"]
    allowed_callers: ["runtime"]
    return_mode: "in_memory_only"
