<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>GNAT Presentation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide {
      width: 90%;
      max-width: 1000px;
      background: #242424;
      padding: 60px;
      border-radius: 8px;
      text-align: center;
      border: 2px solid #c41e2a;
    }
    h1 { color: #c41e2a; font-size: 3rem; margin-bottom: 20px; }
    h2 { font-size: 2rem; margin-bottom: 20px; }
    p { font-size: 1.2rem; line-height: 1.6; }
    .controls {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #9e9e9e;
    }
  </style>
</head>
<body>

<div class="slide">
  <h1>GNAT</h1>
  <h2>Cyber Threat Intel Made Simple</h2>
  <p>Version 1.9.0 • 159 Connectors • STIX 2.1 Native</p>
  <div class="controls">
    <p>If you see this text, the page is loading correctly.</p>
  </div>
</div>

</body>
</html>
