name: Secrets Hygiene

on:
  pull_request:
    paths:
      - 'gnat/agents/secrets/**'
      - 'config/secrets_policy.example.yaml'
      - 'tests/unit/agents/test_secret*'
  workflow_dispatch:

jobs:
  secrets-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run secrets agent tests
        run: |
          pytest tests/unit/agents/test_secrets_broker.py tests/unit/agents/test_secret_hygiene.py -q
