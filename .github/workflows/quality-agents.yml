name: Quality Agents

on:
  pull_request:
    paths:
      - "gnat/agents/quality/**"
      - "gnat/connectors/**"
      - "tests/**"
      - ".github/workflows/quality-agents.yml"
  workflow_dispatch:

jobs:
  contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run contract unit tests
        run: pytest tests/unit/agents/test_contract_agent.py -q
      - name: Run contract checks
        run: |
          python -m gnat.agents.quality.cli contract             --repo-root .             --profiles gnat/agents/quality/config/contract_profiles.example.json

  fixture-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run fixture coverage unit tests
        run: pytest tests/unit/agents/test_fixture_coverage_agent.py -q
      - name: Run fixture coverage checks
        run: |
          python -m gnat.agents.quality.cli fixtures             --repo-root .             --registry gnat/agents/quality/config/fixture_registry.example.json

  normalization:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run normalization tests
        run: pytest tests/unit/agents/test_normalization_regression.py -q
